<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fut Core - Perfil</title>
    <link rel="stylesheet" href="../css/componentes.css">
    <link rel="stylesheet" href="../css/style-perfil.css">
    <link rel="stylesheet" href="../css/style-auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="shortcut icon" href="../img/logo/logo-favicon.png" type="image/x-icon">
</head>

<body class="fondo-principal texto-blanco">

    <header class="header" id="header-placeholder">

    </header>

    <main class="contenedor relleno-vertical-20 relleno-horizontal-10 caja-flexible flex-columna brecha-20">


        <!-- FORMULARIO DE DATOS DE PERFIL (editable) -->

        <section class="fondo-oscuro radio-grande margen-auto relleno-20 sombra ancho-100 borde-sup-azulado">
            <div class="texto-centrado margen-abajo-20 relleno-abajo-10 borde-inf-azulado">
                <h2 class="texto-muy-grande texto-blanco">Perfil de Usuario</h2>
            </div>

            <form id="formPerfil" class="caja-flexible flex-columna brecha-10" novalidate>

                <!-- Grilla de datos personales y preferencias -->
                <div class="caja-flexible envolver-flex brecha-20 estirar">

                    <!-- Mis Datos -->
                    <article class="tarjeta fondo-gris relleno-20 radio-mediano crecer-1 ancho-minimo-300 borde-gris">
                        <h3
                            class="texto-blanco texto-grande margen-abajo-10 relleno-abajo-5 borde-inf-azulado texto-centrado">
                            Mis Datos</h3>

                        <div class="caja-flexible flex-columna brecha-10 margen-arriba-10">

                            <div class="caja-flexible flex-columna">
                                <label for="perfilNombre" class="texto-secundario texto-chico margen-abajo-5">Nombre y
                                    Apellido</label>
                                <input type="text" id="perfilNombre" name="perfilNombre" class="auth-input" required>
                                <span class="campo-error" id="perfilNombreError"></span>
                            </div>

                            <div class="caja-flexible flex-columna">
                                <label for="perfilEmail" class="texto-secundario texto-chico margen-abajo-5">Correo
                                    Electrónico</label>
                                <input type="email" id="perfilEmail" name="perfilEmail" class="auth-input" required>
                                <span class="campo-error" id="perfilEmailError"></span>
                            </div>

                            <div class="caja-flexible flex-columna">
                                <label for="perfilDni" class="texto-secundario texto-chico margen-abajo-5">DNI</label>
                                <input type="text" id="perfilDni" name="perfilDni" class="auth-input" required>
                                <span class="campo-error" id="perfilDniError"></span>
                            </div>

                            <div class="caja-flexible flex-columna">
                                <label for="perfilTelefono"
                                    class="texto-secundario texto-chico margen-abajo-5">Teléfono</label>
                                <input type="text" id="perfilTelefono" name="perfilTelefono" class="auth-input"
                                    placeholder="+54 9 11 1234-5678">
                                <span class="campo-error" id="perfilTelefonoError"></span>
                            </div>

                        </div>
                    </article>

                    <!-- Preferencias Futbolísticas -->
                    <article class="tarjeta fondo-gris relleno-20 radio-mediano crecer-1 ancho-minimo-300 borde-gris">
                        <h3
                            class="texto-blanco texto-grande margen-abajo-10 relleno-abajo-5 borde-inf-azulado texto-centrado">
                            Preferencias Futbolísticas</h3>

                        <div class="caja-flexible flex-columna brecha-10 margen-arriba-10">

                            <div class="caja-flexible flex-columna">
                                <label for="perfilPosicion" class="texto-secundario texto-chico margen-abajo-5">Posición
                                    en la cancha</label>
                                <select id="perfilPosicion" name="perfilPosicion" class="auth-input">
                                    <option value="">-- Seleccioná una posición --</option>
                                    <option value="Arquero">Arquero</option>
                                    <option value="Defensor Central">Defensor Central</option>
                                    <option value="Lateral Derecho">Lateral Derecho</option>
                                    <option value="Lateral Izquierdo">Lateral Izquierdo</option>
                                    <option value="Mediocampista Defensivo">Mediocampista Defensivo</option>
                                    <option value="Mediocampista Central">Mediocampista Central</option>
                                    <option value="Mediocampista Ofensivo">Mediocampista Ofensivo</option>
                                    <option value="Extremo Derecho">Extremo Derecho</option>
                                    <option value="Extremo Izquierdo">Extremo Izquierdo</option>
                                    <option value="Delantero Centro">Delantero Centro</option>
                                </select>
                            </div>

                            <div class="caja-flexible flex-columna">
                                <label for="perfilLiga" class="texto-secundario texto-chico margen-abajo-5">Liga
                                    Favorita</label>
                                <select id="perfilLiga" name="perfilLiga" class="auth-input">
                                    <option value="">-- Seleccioná una liga --</option>
                                    <option value="Liga Profesional Argentina">Liga Profesional Argentina</option>
                                    <option value="Premier League">Premier League</option>
                                    <option value="La Liga">La Liga</option>
                                    <option value="Serie A">Serie A</option>
                                    <option value="Bundesliga">Bundesliga</option>
                                    <option value="Ligue 1">Ligue 1</option>
                                    <option value="Brasileirão">Brasileirão</option>
                                    <option value="MLS">MLS</option>
                                </select>
                            </div>

                        </div>
                    </article>

                </div>

                <!-- Mensajes globales y botones -->
                <p class="auth-mensaje-error" id="perfilError"></p>
                <p class="auth-mensaje-exito" id="perfilExito"></p>

                <div class="caja-flexible brecha-10 justificar-centro margen-arriba-10">
                    <button type="submit" class="boton boton-esmeralda">
                        <i class="fa-solid fa-floppy-disk"></i> Guardar Perfil
                    </button>
                    <button type="reset" class="boton"
                        style="background-color: var(--color-tarjetas); color: var(--color-texto-secundario); border: 1px solid var(--color-acento);">
                        <i class="fa-solid fa-eraser"></i> Limpiar
                    </button>
                </div>

            </form>
        </section>


        <!-- EQUIPOS FAVORITOS (se cargan dinámicamente desde localStorage) -->

        <section class="fondo-oscuro radio-grande margen-auto relleno-20 sombra ancho-100 borde-sup-azulado">
            <div class="texto-centrado margen-abajo-20 relleno-abajo-10 borde-inf-azulado">
                <h2 class="texto-muy-grande texto-blanco">Mis Equipos Favoritos</h2>
            </div>

            <!-- Este div vacío se llena dinámicamente desde perfil.js -->
            <!-- El id 'grilla-favoritos' es el que usamos en JS para encontrarlo -->
            <div id="grilla-favoritos" class="cuadricula-favoritos brecha-20">
                <!-- Los favoritos se inyectan aquí con JavaScript -->
            </div>

            <!-- Mensaje que se muestra cuando no hay favoritos guardados -->
            <p id="mensaje-sin-favoritos" class="texto-secundario texto-centrado relleno-20" style="display: none;">
                No tenés equipos favoritos todavía. ¡Andá a la sección de
                <a href="../equipo/equipo.html"
                    style="color: var(--color-esmeralda); text-decoration: underline;">Equipos</a>
                y marcá tus favoritos con la estrella ⭐!
            </p>
        </section>
    </main>



    <footer id="footer-placeholder"></footer>

    <script src="../js/componentes.js"></script>
    <script src="../js/perfil.js"></script>
    <script>
        renderizarHeader("../");
        renderizarFooter("../");
    </script>

</body>

</html>
