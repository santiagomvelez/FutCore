<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutCore - Jugadores</title>
    <link rel="stylesheet" href="../css/componentes.css">
    <link rel="stylesheet" href="../css/style-jugadores.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="shortcut icon" href="img/logo/logo-favicon.png" type="image/x-icon">
</head>
<body>

    <header id="header-placeholder"></header>

    

    <main>

        <section class="hero">
            <h1>Jugadores</h1>
            <p>Explorá los mejores jugadores del mundo</p>
            <div class="linea"></div>
        </section>
    
        
        <section class="buscador-container">
            <div class="buscador">
                <div class="grupo-input">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search" placeholder="Buscar jugador, posición o país...">
                </div>
                
                <select id="filtro-equipo" class="filtro-select">
                    <option value="todos">Todos los equipos</option>
                </select>
            </div>
        </section>

        <div id="main-jugadores"> </div>


    </main>

    <footer id="footer-placeholder"></footer>

    <script src="../js/componentes.js"></script>
    <script src="../js/equipo.js"></script>
    <script src="../js/jugadores.js"></script>
    <script>
        renderizarHeader("../");
        renderizarFooter("../");
        renderizarJugadores(equipos);
    </script>

</body>
</html>
