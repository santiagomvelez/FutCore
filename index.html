<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutCore</title>
    <link rel="stylesheet" href="Css/componentes.css">
    <link rel="stylesheet" href="Css/style-inicio.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="shortcut icon" href="../img/Logo/logo-favicon.png" type="image/x-icon">
</head>
<body>  

    <header id="header-placeholder"></header>

    <main> 
        <section class="contenedor-section"> 
            <h1>Bienvenido a FutCore</h1>
            <p>Toda la pasión del fútbol en un solo lugar. Explorá las estadísticas, armá tu lista de favoritos y seguí a los mejores.</p>

            <div class="contenedor-botones">
                <a href="equipo/equipo.html" class="btn-primario">Escudo y Equipos</a>
                <a href="jugadores/jugadores.html" class="btn-secundario">Ver Jugadores</a>
            </div>
        </section>

        <section class="seccion-destacados">
            <h2>Equipos y Jugadores Destacados</h2>
            
            <div class="contenedor-columnas">
                
                <div class="cuadrado-carrusel">
                    <h3>Equipos</h3>
                    <div class="carrusel-contenedor">
                        <button class="carrusel-btn" id="btn-ant-equipos">❮</button>
                        <div class="carrusel-pista" id="pista-equipos"></div>
                        <button class="carrusel-btn" id="btn-sig-equipos">❯</button>
                    </div>
                </div>

                <div class="cuadrado-carrusel">
                    <h3>Jugadores</h3>
                    <div class="carrusel-contenedor">
                        <button class="carrusel-btn" id="btn-ant-jugadores">❮</button>
                        <div class="carrusel-pista" id="pista-jugadores"></div>
                        <button class="carrusel-btn" id="btn-sig-jugadores">❯</button>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <footer id="footer-placeholder"></footer>
    



    <script src="js/componentes.js"></script>
    <script src="js/equipo.js"></script>
    <script src="js/carrusel.js"></script>
    
    <script>
        renderizarHeader();
        renderizarFooter();
    </script>
</body>
</html>
